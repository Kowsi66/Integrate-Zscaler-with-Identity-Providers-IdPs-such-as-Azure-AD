services:
  - type: web
    name: zscaler-idp-fusion
    runtime: node
    buildCommand: npm install && npx vite build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: PORT
        value: 10000
